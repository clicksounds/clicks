<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Sounds Index</title>
    <link rel="icon" href="./.images/favicon.png" type="image/png">
    <meta property="og:title" content="Click Sounds: Download">
    <meta property="og:description" content="Download the Click Sounds mod for Geode">
    <meta property="og:image" content="https://raw.githubusercontent.com/clicksounds/clicks/refs/heads/main/.images/fullres-logo.png">
    <meta property="og:url" content="https://clicksounds.xyz/download.html">
    <meta property="og:type" content="website"/>
    <script src="/.navbar/navbarFetch.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2 {
            color: #85ccf5;
        }

        h1 {
            text-align: center;
            margin-top: 100px;
            font-size: 2.5em;
        }

        h2 {
            margin-bottom: 0px;
            margin-top: 0px;
        }

        .code-inline {
            background: #1f1f30;
            color: #f5f5f5;
            font-family: monospace;
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }

        img {
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.58);
        }

        video {
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.58);
        }

        section {
            background-color: #2a2a3d;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        a {
            color: #00aaff;
        }

        .footnote {
            color: #999999;
            margin-top: 0px;
            display: block;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            background-color: #3a3a50;
            color: #fff;
        }

        input[type="radio"] {
            margin-right: 5px;
            display: inline-block;
        }

        label[for="typeUseful"],
        label[for="typeMeme"] {
            display: inline-block;
            margin-right: 10px;
        }

        input[type="file"] {
            border: 2px dashed #85ccf5;
            text-align: center;
            margin-top: 12px;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background-color: #555;
            color: #1e1e2f;
            font-size: 1rem;
            cursor: not-allowed;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background-color: #6ea7c7;
        }

        button:enabled {
            background-color: #6ee873;
            cursor: pointer;
        }

        button:enabled:hover {
            background-color: #4abf5f;
            transform: translateY(-2px);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background-color: #3a3a50;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }

        p {
            font-size: 0.9rem;
        }

        br {
            display: block;
            line-height: 1;
        }

        @media (max-width: 600px) {
            section {
                margin: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="navbar"></div>

    <h1>Download Click Sounds</h1>

    <section>
        <video src="https://github.com/BeatACVR/image-cdn/raw/refs/heads/main/geode-cs-install.mp4" alt= "Installing CS using the Geode index." style="display: block; margin-left: auto; margin-right: auto; width: 100%;" loop autoplay muted></video>
    
        <h3><br>Click Sounds Full can be downloaded ingame from the Geode Index.</h3>
        <label><br>Click Sounds Lite can be downloaded from <a href="https://github.com/clicksounds/geode-clicksoundslite/releases/latest">here.</a></label>
        <label><br>Click Sounds Full can also be downloaded from <a href="https://github.com/clicksounds/geode-clicksound/releases/latest">here.</a></label>
        
    </section>
    
</body>
</html>
